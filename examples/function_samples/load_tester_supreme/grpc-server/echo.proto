syntax = "proto3";

service Echo {
    rpc EchoMessage (EchoRequest) returns (EchoReply) {}
    rpc EchoMessageStreaming (stream EchoRequest) returns (stream EchoReply) {}
}

message EchoRequest {
    string message = 1;
    optional int32 repeats = 2;
    optional float delay = 3;
}

message EchoReply {
    string message = 1;
    optional int32 repeats = 2;
    optional float delay = 3;
}